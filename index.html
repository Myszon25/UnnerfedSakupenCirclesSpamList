<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-color: #020204;
        --card-bg: rgba(12, 12, 18, 0.65);
        --accent-1: #9b7bff;
        --accent-2: #00d4ff;
        --accent-pink: #ff4dff;
        --discord: #5865F2;
        --glass-border: rgba(255, 255, 255, 0.08);
    }

    /* PREMIUM SCROLLBAR */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: #1a1a26; border-radius: 10px; border: 2px solid var(--bg-color); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-1); }

    body {
        margin: 0;
        background: var(--bg-color);
        font-family: 'Rubik', sans-serif;
        color: white;
        overflow-x: hidden;
        padding-top: 140px;
        min-height: 100vh;
    }

    /* DEEP SPACE AMBIENT BACKGROUND */
    .ambient-bg {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -1;
        background: 
            radial-gradient(circle at 15% 25%, rgba(255, 77, 255, 0.07) 0%, transparent 45%),
            radial-gradient(circle at 85% 75%, rgba(0, 212, 255, 0.07) 0%, transparent 45%),
            radial-gradient(circle at 50% 50%, rgba(155, 123, 255, 0.04) 0%, transparent 60%);
        filter: blur(30px);
        animation: drift 20s ease-in-out infinite alternate;
    }

    @keyframes drift {
        0% { transform: scale(1); }
        100% { transform: scale(1.15); }
    }

    /* ===================== */
    /* PREMIUM ROUNDED NAV   */
    /* ===================== */

    .navbar {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        
        width: 92%;
        max-width: 1250px;
        height: 76px;
        box-sizing: border-box;
        
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        border-radius: 100px;

        background: rgba(8, 8, 12, 0.5);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        
        border: 1px solid var(--glass-border);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7), 
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
        
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .navbar:hover {
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                    0 0 40px rgba(155, 123, 255, 0.15);
        transform: translateX(-50%) translateY(-2px);
    }

    .logo {
        font-size: 24px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        background: linear-gradient(to right, #fff, var(--accent-pink), var(--accent-2), #fff);
        background-size: 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: moveGradient 6s linear infinite;
    }

    .right-nav {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    #searchBar {
        width: 190px;
        height: 44px;
        padding: 0 20px;
        border-radius: 100px;
        border: 1px solid var(--glass-border);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        font-family: inherit;
        font-weight: 500;
        outline: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #searchBar:focus {
        width: 250px;
        background: rgba(0, 0, 0, 0.6);
        border-color: var(--accent-1);
        box-shadow: 0 0 25px rgba(155, 123, 255, 0.25);
    }

    .sort-dropdown {
        height: 44px;
        padding: 0 16px;
        border-radius: 100px;
        border: 1px solid var(--glass-border);
        background: rgba(0, 0, 0, 0.4);
        color: #ccc;
        font-family: inherit;
        font-weight: 600;
        font-size: 13px;
        outline: none;
        cursor: pointer;
        transition: all 0.3s;
    }

    .sort-dropdown:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
    }

    .sort-dropdown option {
        background: #0d0d13;
        color: white;
    }

    .btn {
        height: 44px;
        padding: 0 24px;
        border-radius: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        transition: all 0.3s ease;
        white-space: nowrap;
    }

    .discord {
        background: rgba(88, 101, 242, 0.15);
        color: #8c94f8;
        border: 1px solid rgba(88, 101, 242, 0.3);
    }

    .discord:hover {
        background: var(--discord);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4);
    }

    .theo-btn {
        background: linear-gradient(135deg, var(--accent-pink), var(--accent-1), var(--accent-2));
        background-size: 200%;
        color: white;
        box-shadow: 0 4px 15px rgba(155, 123, 255, 0.25);
    }

    .theo-btn:hover {
        background-position: 100%;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(155, 123, 255, 0.45);
    }

    /* ===================== */
    /* CLEANER DASHBOARD     */
    /* ===================== */

    .stats-panel {
        width: min(920px, 95vw);
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 15px;
    }

    .stat-box {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 18px 24px;
        backdrop-filter: blur(10px);
    }

    .stat-label { font-size: 11px; text-transform: uppercase; color: #888; font-weight: 700; letter-spacing: 1px; }
    .stat-value { font-size: 24px; font-weight: 900; color: #fff; margin-top: 4px; }
    .stat-box:nth-child(2) .stat-value { color: var(--accent-2); }

    /* ===================== */
    /* ELEGANT CARD LAYOUT   */
    /* ===================== */

    .container {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 20px 80px 20px;
        gap: 25px;
        box-sizing: border-box;
    }

    .card {
        width: min(920px, 95vw);
        height: 240px;
        display: flex;
        border-radius: 26px;
        overflow: hidden;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 20px 45px rgba(0,0,0,0.4);
        position: relative;
        opacity: 0;
        transform: translateY(35px);
    }

    @keyframes cardEnter {
        to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 40px rgba(155, 123, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.2);
    }

    /* VISUAL PARTITIONS */
    .left { 
        width: 40%; height: 100%; 
        position: relative; cursor: pointer;
        background: #000; overflow: hidden;
        flex-shrink: 0;
    }
    .left img, .right img { 
        width: 100%; height: 100%; object-fit: cover; 
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card:hover .left img, .card:hover .right img { transform: scale(1.06); }
    .left iframe { width: 100%; height: 100%; border: none; }

    .right { width: 60%; height: 100%; position: relative; overflow: hidden; }
    
    /* Elegant Content Overlay Engine inside Right Partition */
    .card-ui-layer {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: linear-gradient(to right, rgba(2,2,4,1) 0%, rgba(2,2,4,0.7) 40%, rgba(2,2,4,0.2) 100%);
        padding: 26px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    /* VIDEO PLAY INTERFACE */
    .play-overlay {
        position: absolute; inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: flex; justify-content: center; align-items: center;
        transition: background 0.3s;
    }
    .left:hover .play-overlay { background: rgba(0, 0, 0, 0.1); }
    
    .play-btn {
        width: 56px; height: 56px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255,255,255,0.4);
        backdrop-filter: blur(12px);
        border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .play-btn::after {
        content: ''; border-top: 10px solid transparent; border-bottom: 10px solid transparent;
        border-left: 16px solid white; margin-left: 5px;
    }
    .left:hover .play-btn {
        transform: scale(1.15);
        background: white;
        box-shadow: 0 0 30px rgba(255,255,255,0.6);
    }
    .left:hover .play-btn::after { border-left-color: black; }

    /* TYPOGRAPHY OVERLAY SYSTEMS */
    .ui-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
    }
    
    .title-wrapper { display: flex; align-items: center; gap: 12px; }
    
    .rank-badge {
        background: linear-gradient(135deg, #12121c, #1a1a2e);
        border: 1px solid rgba(155, 123, 255, 0.4);
        color: var(--accent-1);
        padding: 4px 12px; border-radius: 10px;
        font-weight: 900; font-size: 15px;
    }
    
    .title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .sub { font-size: 14px; color: #b3b3b3; margin-top: 6px; font-weight: 500; }
    .sub b { color: #fff; }
    
    .chance {
        font-weight: 900; font-size: 22px;
        color: var(--accent-2);
        text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    .ui-bottom {
        display: flex;
        justify-content: flex-end;
    }

    .wr {
        padding: 8px 20px; border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-size: 13px; font-weight: 700; text-decoration: none; color: white;
        transition: all 0.3s;
        display: flex; align-items: center; gap: 6px;
    }
    
    .wr:hover {
        background: white; color: black;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(255,255,255,0.2);
    }

    .empty-state {
        text-align: center; padding: 50px; 
        border: 1px dashed rgba(255,255,255,0.1); border-radius: 20px;
        color: #555; font-weight: 500; display: none; width: 100%;
        box-sizing: border-box;
    }

    /* ================================== */
    /* FLUID & PERFECT MOBILE RESPONSIVE  */
    /* ================================== */

    @media(max-width: 900px) {
        .navbar {
            flex-direction: column; height: auto;
            padding: 20px; border-radius: 24px; gap: 15px; top: 12px; width: 94%;
        }
        .right-nav { flex-wrap: wrap; justify-content: center; width: 100%; gap: 10px; }
        #searchBar { width: 100% !important; }
        .sort-dropdown { width: 100%; }
        .btn { width: 100%; }
        body { padding-top: 250px; }
        
        .stats-panel { gap: 12px; width: 94%; }
        .stat-value { font-size: 18px; }

        /* Structural Unwrapping: Swapping absolute metrics to native structural layouts */
        .card { 
            flex-direction: column; 
            height: auto; 
            width: 94vw;
            border-radius: 20px;
        }
        .left { width: 100%; height: 190px; }
        .right { width: 100%; height: auto; }
        
        .card-ui-layer {
            position: relative; /* Returns block flow control */
            padding: 20px;
            background: #09090e;
            gap: 20px;
        }
        
        .ui-top { flex-direction: column; gap: 12px; }
        .chance { align-self: flex-start; font-size: 20px; }
        .ui-bottom { width: 100%; }
        .wr { width: 100%; justify-content: center; box-sizing: border-box; }
    }

    @keyframes moveGradient {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }
</style>
</head>

<body>

<div class="ambient-bg"></div>

<div class="navbar">
    <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        Luck Based List
    </div>

    <div class="right-nav">
        <input type="text" id="searchBar" placeholder="Search levels...">
        
        <select id="sortSelect" class="sort-dropdown">
            <option value="place">Sort: Placement</option>
            <option value="chance">Sort: Lowest Chance</option>
            <option value="alpha">Sort: Alphabetical</option>
        </select>

        <a class="btn theo-btn" href="YOUR_LINK_HERE" target="_blank">Theoretically Possible</a>
        <a class="btn discord" href="YOUR_DISCORD_LINK" target="_blank">Discord</a>
    </div>
</div>

<div class="container">
    <div class="stats-panel">
        <div class="stat-box">
            <div class="stat-label">Total Documented</div>
            <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Hardest Verified</div>
            <div class="stat-value" id="statHardest">-</div>
        </div>
    </div>

    <div id="container" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:25px;"></div>
    
    <div id="emptyState" class="empty-state">
        No matches recorded for your specific parameters.
    </div>
</div>

<script>
let container = document.getElementById("container");
let searchBar = document.getElementById("searchBar");
let sortSelect = document.getElementById("sortSelect");
let emptyState = document.getElementById("emptyState");
let levelsData = [];

window.playVideo = function(element, videoId) {
    element.innerHTML = `
        <iframe 
            src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>`;
    element.style.cursor = 'default';
};

function runStatisticsCompute(data) {
    if(data.length === 0) {
        document.getElementById("statTotal").innerText = "0";
        document.getElementById("statHardest").innerText = "-";
        return;
    }
    document.getElementById("statTotal").innerText = data.length;
    let hardest = data.reduce((min, l) => l.place < min.place ? l : min, data[0]);
    document.getElementById("statHardest").innerText = hardest ? `#${hardest.place} ${hardest.name}` : "-";
}

function render(data){
    container.innerHTML = "";
    
    if(data.length === 0) {
        emptyState.style.display = "block";
        return;
    }
    emptyState.style.display = "none";

    data.forEach((l, index) => {
        let card = document.createElement("div");
        card.className = "card";
        card.style.animation = `cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards ${index * 0.06}s`;

        card.innerHTML = `
        <div class="left" onclick="playVideo(this, '${l.youtube}')">
            <img src="https://img.youtube.com/vi/${l.youtube}/hqdefault.jpg" alt="Thumbnail">
            <div class="play-overlay"><div class="play-btn"></div></div>
        </div>
        <div class="right">
            <img src="${l.gif}" alt="Visual Loop Animation" style="position:absolute; inset:0; z-index:1;">
            <div class="card-ui-layer">
                <div class="ui-top">
                    <div class="text-group">
                        <div class="title-wrapper">
                            <div class="rank-badge">#${l.place}</div>
                            <div class="title">${l.name}</div>
                        </div>
                        <div class="sub">Creator: <b>${l.author}</b> • ID: ${l.id}</div>
                    </div>
                    <div class="chance">${l.chance}</div>
                </div>
                <div class="ui-bottom">
                    <a class="wr" href="${l.wrLink}" target="_blank">🏆 ${l.wrName}</a>
                </div>
            </div>
        </div>
        `;
        container.appendChild(card);
    });
}

function processPipeline() {
    let query = searchBar.value.toLowerCase();
    let sortOption = sortSelect.value;

    let filtered = levelsData.filter(l =>
        l.name.toLowerCase().includes(query) ||
        l.author.toLowerCase().includes(query) ||
        String(l.id).includes(query)
    );

    if(sortOption === "place") {
        filtered.sort((a,b) => a.place - b.place);
    } else if (sortOption === "chance") {
        filtered.sort((a,b) => parseFloat(a.chance) - parseFloat(b.chance));
    } else if (sortOption === "alpha") {
        filtered.sort((a,b) => a.name.localeCompare(b.name));
    }

    render(filtered);
}

// SECURE ASYNC CONSOLE LOAD
fetch("levels.json")
.then(r => r.json())
.then(data => {
    levelsData = data;
    runStatisticsCompute(levelsData);
    processPipeline();
})
.catch(() => {
    // Interactive development fallback engine content
    levelsData = [
        { place: 1, name: "VSC", author: "BoBoBo", id: "666666", chance: "0.001%", youtube: "dQw4w9WgXcQ", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3VwY2NmdXJvYmdkMDNnbW96ZHZ0b3E0bWN6ZnA1bWxpY3p6bXF6dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7Tov7edZ6tTuOg8w/giphy.gif", wrLink: "#", wrName: "Paqeo" },
        { place: 2, name: "Tartarus", author: "Riot", id: "123456", chance: "0.052%", youtube: "dQw4w9WgXcQ", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2VwYm81b3ZkM3JicnpqNDVhcWpxZnNwbTVvNXZpdXp0cHhrNDRxbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l0HlHFRbmaZtBRhXG/giphy.gif", wrLink: "#", wrName: "Mefewe" }
    ];
    runStatisticsCompute(levelsData);
    processPipeline();
});

searchBar.addEventListener("input", processPipeline);
sortSelect.addEventListener("change", processPipeline);
</script>

</body>
</html>
