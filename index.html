<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:black;
    font-family:'Rubik', sans-serif;
    color:white;
    overflow-x:hidden;
}

/* CONTAINER */
.container{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    gap:20px;
}

/* CARD */
.card{
    width: min(900px, 95vw);
    min-height: 220px;

    display:flex;
    border-radius:18px;
    overflow:hidden;

    border:2px solid white;
    background:#0a0a0a;

    position:relative;
}

/* LEFT VIDEO */
.left{
    width:35%;
    min-height:220px;
}

.left iframe{
    width:100%;
    height:100%;
    border:none;
}

/* RIGHT IMAGE */
.right{
    width:65%;
    min-height:220px;
}

.right img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INFO */
.info{
    position:absolute;
    top:10px;
    left:10px;
}

.title{
    font-size:20px;
    font-weight:800;
}

.sub{
    font-size:12px;
    opacity:0.8;
}

/* CHANCE */
.chance{
    position:absolute;
    top:10px;
    right:10px;
    font-weight:800;
}

/* WR */
.wr{
    position:absolute;
    bottom:10px;
    right:10px;

    padding:5px 10px;
    border-radius:12px;

    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.5);

    font-size:12px;
    text-decoration:none;
    color:white;
}

/* 📱 MOBILE FIX */
@media (max-width: 768px){

    .card{
        flex-direction:column;
    }

    .left,
    .right{
        width:100%;
        height:200px;
    }

    .info{
        position:relative;
        top:auto;
        left:auto;
        padding:10px;
    }

    .chance{
        position:relative;
        top:auto;
        right:auto;
        padding:10px;
    }

    .wr{
        position:relative;
        bottom:auto;
        right:auto;
        margin:10px;
        display:inline-block;
    }
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<script>

fetch("levels.json")
.then(r => r.json())
.then(data => {

    const container = document.getElementById("container");

    data.sort((a,b) => a.place - b.place);

    data.forEach(l => {

        const card = document.createElement("div");
        card.className = "card";

        const left = document.createElement("div");
        left.className = "left";

        const iframe = document.createElement("iframe");
        iframe.src = `https://www.youtube.com/embed/${l.youtube}`;
        iframe.allowFullscreen = true;

        left.appendChild(iframe);

        const right = document.createElement("div");
        right.className = "right";

        const img = document.createElement("img");
        img.src = l.gif;
        img.loading = "lazy";

        right.appendChild(img);

        const info = document.createElement("div");
        info.className = "info";
        info.innerHTML = `
            <div class="title">#${l.place} ${l.name}</div>
            <div class="sub">by ${l.author} • id:${l.id}</div>
        `;

        const chance = document.createElement("div");
        chance.className = "chance";
        chance.textContent = l.chance;

        const wr = document.createElement("a");
        wr.className = "wr";
        wr.href = l.wrLink;
        wr.target = "_blank";
        wr.textContent = l.wrName;

        card.appendChild(left);
        card.appendChild(right);
        card.appendChild(info);
        card.appendChild(chance);
        card.appendChild(wr);

        container.appendChild(card);

    });

});

</script>

</body>
</html>
